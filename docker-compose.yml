services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    user: root
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/home/dynamodblocal/data"]
    volumes:
      - dynamodb-data:/home/dynamodblocal/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000 -o /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI (http://localhost:9001, login: minioadmin/minioadmin)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc:latest
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/pensieve-local &&
        mc anonymous set download local/pensieve-local
      "
    depends_on:
      minio:
        condition: service_healthy

  app:
    build:
      context: ./app
    ports:
      - "3001:3001"
    volumes:
      - ./app:/app
      - /app/node_modules
    env_file:
      - ./app/.env.local
    environment:
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      AWS_S3_ENDPOINT: http://minio:9000
      AWS_S3_PUBLIC_ENDPOINT: http://localhost:9000
      AWS_S3_BUCKET: pensieve-local
      NEXT_PUBLIC_CLOUDFRONT_URL: http://localhost:9000/pensieve-local
      WATCHPACK_POLLING: "true"
    depends_on:
      dynamodb-local:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully

volumes:
  dynamodb-data:
