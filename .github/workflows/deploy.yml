# ── Pensieve Production Deploy ─────────────────────────────────────────────────
#
# Triggers on every push to main. Zips Lambda handlers, applies Terraform,
# then builds and pushes the Next.js Docker image to ECR (after Terraform so
# NEXT_PUBLIC_* values can be read from outputs), and force-redeploys ECS.
#
# Authentication: GitHub OIDC federation — no stored AWS credentials needed.
# The workflow assumes arn:aws:iam::931097097534:role/pensieve-github-actions
# via sts:AssumeRoleWithWebIdentity. The OIDC provider and role are provisioned
# by infra/github-oidc.tf. Run `terraform apply` once locally to bootstrap them
# before the first pipeline run (chicken-and-egg: the role must exist first).
#
# No GitHub Secrets are required for AWS access.
#
# S3 backend prereqs — run once before the first pipeline execution:
#   See infra/backend.tf for the exact AWS CLI commands.
#
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy to Production

on:
  push:
    branches:
      - main

# Cancel any in-progress deploy when a new push arrives.
concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  # ECS cluster/service names are hard-coded to match the Terraform locals
  # (name_prefix = "pensieve" when environment = "").
  ECS_CLUSTER: pensieve
  ECS_SERVICE: pensieve-app
  TF_DIR: infra

jobs:
  deploy:
    name: Build → Terraform → ECS
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # required for OIDC token exchange
      contents: read    # required for actions/checkout

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. AWS credentials (OIDC) ──────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::931097097534:role/pensieve-github-actions
          aws-region:     us-east-1

      # ── 3. Log in to ECR ───────────────────────────────────────────────────
      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Derive the ECR repository URL ──────────────────────────────────
      #
      # The ECR URL is an output of Terraform, but we need it before we run
      # Terraform (to tag the image). It follows a predictable pattern:
      #   <account-id>.dkr.ecr.<region>.amazonaws.com/pensieve-app
      #
      # We derive account-id from the credentials rather than hard-coding it.
      - name: Derive ECR repository URL
        id: ecr-url
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URL="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/pensieve-app"
          echo "url=${ECR_URL}" >> "$GITHUB_OUTPUT"

      # ── 5. Build Lambda zips ───────────────────────────────────────────────
      #
      # Each Lambda handler is a single bundled .js file in infra/lambda-src/.
      # Terraform references the .zip by filename and uses its SHA256 to decide
      # whether to redeploy, so we always re-zip from the current source.
      #
      # Handlers: auth.js, lexicons.js, invalidate.js, sync.js
      # (cost_report.py is a separate Lambda not managed by the same pattern.)
      - name: Zip Lambda handlers
        working-directory: infra/lambda-src
        run: |
          for handler in auth lexicons invalidate sync; do
            echo "  Zipping ${handler}.js → ${handler}.zip"
            zip -j "${handler}.zip" "${handler}.js"
          done

          # cost_report is Python — zip it separately
          echo "  Zipping cost_report.py → cost_report.zip"
          zip -j cost_report.zip cost_report.py

      # ── 6. Set up Terraform ────────────────────────────────────────────────
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      # ── 7. Terraform init ──────────────────────────────────────────────────
      #
      # Initialises the S3 backend defined in infra/backend.tf.
      # The AWS credentials configured in step 2 are used automatically.
      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      # ── 8. Read Terraform outputs (no apply) ───────────────────────────────
      #
      # api_endpoint and cloudfront_domain are already in state from the
      # previous apply — read them now so the Docker build can bake
      # NEXT_PUBLIC_* values in before we run terraform apply.
      - name: Read Terraform outputs
        id: tf-outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "api_url=$(terraform output -raw api_endpoint)" >> "$GITHUB_OUTPUT"
          echo "cf_url=https://$(terraform output -raw cloudfront_domain)" >> "$GITHUB_OUTPUT"

      # ── 9. Build & push Docker image ───────────────────────────────────────
      #
      # Image is pushed BEFORE terraform apply so the task definition always
      # points to an image that already exists in ECR. If this step fails,
      # Terraform never updates the task definition, so the previous image
      # keeps running.
      - name: Build Docker image
        env:
          ECR_URL: ${{ steps.ecr-url.outputs.url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg "NEXT_PUBLIC_API_URL=${{ steps.tf-outputs.outputs.api_url }}" \
            --build-arg "NEXT_PUBLIC_CLOUDFRONT_URL=${{ steps.tf-outputs.outputs.cf_url }}" \
            --tag "${ECR_URL}:${IMAGE_TAG}" \
            --tag "${ECR_URL}:latest" \
            ./app

      - name: Push Docker image to ECR
        env:
          ECR_URL: ${{ steps.ecr-url.outputs.url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push "${ECR_URL}:${IMAGE_TAG}"
          docker push "${ECR_URL}:latest"

      # ── 10. Terraform apply ────────────────────────────────────────────────
      #
      # Runs after the image is in ECR. Passes the Git SHA as app_image_tag
      # so the ECS task definition is updated to the exact image just pushed.
      #
      # Force-unlock any stale lock left by a cancelled run before applying.
      # Safe in CI because only one pipeline runs at a time (concurrency group).
      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          LOCK_ID=$(aws dynamodb get-item \
            --table-name pensieve-tfstate-lock \
            --key '{"LockID":{"S":"pensieve-tfstate-931097097534/pensieve/terraform.tfstate"}}' \
            --query 'Item.Info.S' --output text 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ID',''))" 2>/dev/null || true)
          if [ -n "$LOCK_ID" ] && [ "$LOCK_ID" != "None" ]; then
            echo "Stale lock detected ($LOCK_ID) — force-unlocking..."
            terraform force-unlock -force "$LOCK_ID" || true
          fi
          terraform apply \
            -auto-approve \
            -input=false \
            -var="app_image_tag=${IMAGE_TAG}"

      # ── 12. Force ECS redeploy ─────────────────────────────────────────────
      #
      # Terraform updates the task definition, but force-new-deployment ensures
      # ECS actually replaces running tasks (not just on the next natural cycle).
      - name: Force ECS service redeployment
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --region "$AWS_REGION" \
            --output json \
          | python3 -c "
          import sys, json
          s = json.load(sys.stdin)['service']
          print(f\"  Service : {s['serviceName']}\")
          print(f\"  Status  : {s['status']}\")
          print(f\"  Tasks   : {s['runningCount']}/{s['desiredCount']} running\")
          "

      # ── 13. Wait for service stability ────────────────────────────────────
      #
      # Blocks until all desired tasks are RUNNING and pass health checks, or
      # times out after ~10 minutes (AWS default for services-stable).
      - name: Wait for ECS service to stabilise
        run: |
          echo "Waiting for ${ECS_SERVICE} to stabilise (up to ~10 min)..."
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION"
          echo "ECS service is stable."

      # ── 14. Print deployment summary ───────────────────────────────────────
      - name: Print ALB URL
        working-directory: ${{ env.TF_DIR }}
        run: |
          ALB=$(terraform output -raw alb_dns_name)
          echo ""
          echo "Deploy complete"
          echo "  Image tag : ${{ github.sha }}"
          echo "  App URL   : http://${ALB}"
          echo ""
