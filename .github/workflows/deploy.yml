# ── Pensieve Production Deploy ─────────────────────────────────────────────────
#
# Triggers on every push to main. Rebuilds Lambda handlers from source, builds
# the Next.js app via OpenNext (Lambda + S3-hosted static assets, no ECS/Docker),
# applies Terraform, syncs static assets to S3, and invalidates CloudFront.
#
# Authentication: GitHub OIDC federation — no stored AWS credentials needed.
# The workflow assumes arn:aws:iam::931097097534:role/pensieve-github-actions
# via sts:AssumeRoleWithWebIdentity. The OIDC provider and role are provisioned
# by infra/github-oidc.tf. Run `terraform apply` once locally to bootstrap them
# before the first pipeline run (chicken-and-egg: the role must exist first).
#
# No GitHub Secrets are required for AWS access.
#
# S3 backend prereqs — run once before the first pipeline execution:
#   See infra/backend.tf for the exact AWS CLI commands.
#
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy to Production

on:
  push:
    branches:
      - main

# Cancel any in-progress deploy when a new push arrives.
concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  TF_DIR: infra

jobs:
  deploy:
    name: Build → Terraform → Deploy
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # required for OIDC token exchange
      contents: read    # required for actions/checkout

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 2. AWS credentials (OIDC) ──────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::931097097534:role/pensieve-github-actions
          aws-region:     us-east-1

      # ── 3. Build Lambda handlers from source ───────────────────────────────
      #
      # Bundles lambda/src/*.ts with esbuild and zips each into
      # infra/lambda-src/*.zip. (cost_report.py is zipped separately by
      # Terraform's own archive_file data source — no build step needed here.)
      - name: Build Lambda handlers
        working-directory: lambda
        run: |
          npm ci
          npm run build

      # ── 4. Set up Terraform ────────────────────────────────────────────────
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      # ── 5. Terraform init ──────────────────────────────────────────────────
      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      # ── 6. Read Terraform outputs (no apply) ───────────────────────────────
      #
      # NEXT_PUBLIC_* values are baked into the Next.js build at build time, so
      # they must be read from already-applied state before the OpenNext build
      # runs (these outputs are stable across deploys — api_endpoint and the
      # CloudFront domain don't change).
      - name: Read Terraform outputs
        id: tf-outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "api_url=$(terraform output -raw api_endpoint)" >> "$GITHUB_OUTPUT"
          echo "cf_url=https://$(terraform output -raw cloudfront_domain)" >> "$GITHUB_OUTPUT"
          echo "app_assets_bucket=$(terraform output -raw app_assets_bucket)" >> "$GITHUB_OUTPUT"
          echo "app_distribution_id=$(terraform output -raw app_cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

      # ── 7. Build the Next.js app via OpenNext ───────────────────────────────
      #
      # Produces .open-next/server-functions/default (the Lambda server
      # bundle) and .open-next/assets (static assets synced to S3 below).
      - name: Build app (OpenNext)
        working-directory: app
        env:
          NEXT_PUBLIC_API_URL: ${{ steps.tf-outputs.outputs.api_url }}
          NEXT_PUBLIC_CLOUDFRONT_URL: ${{ steps.tf-outputs.outputs.cf_url }}
        run: |
          npm ci
          npm run build:opennext

      - name: Zip OpenNext server bundle
        run: |
          cd app/.open-next/server-functions/default
          zip -qr ../../../../infra/lambda-src/opennext-server.zip .

      # ── 8. Terraform apply ────────────────────────────────────────────────
      #
      # All Lambda zips (handlers + opennext-server) exist by this point, so
      # the full config can be evaluated and applied in one shot.
      #
      # Force-unlock any stale lock left by a cancelled run before applying.
      # Safe in CI because only one pipeline runs at a time (concurrency group).
      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          LOCK_ID=$(aws dynamodb get-item \
            --table-name pensieve-tfstate-lock \
            --key '{"LockID":{"S":"pensieve-tfstate-931097097534/pensieve/terraform.tfstate"}}' \
            --query 'Item.Info.S' --output text 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ID',''))" 2>/dev/null || true)
          if [ -n "$LOCK_ID" ] && [ "$LOCK_ID" != "None" ]; then
            echo "Stale lock detected ($LOCK_ID) — force-unlocking..."
            terraform force-unlock -force "$LOCK_ID" || true
          fi
          terraform apply -auto-approve -input=false

      # ── 9. Sync static assets to S3 ────────────────────────────────────────
      - name: Sync static assets
        env:
          ASSETS_BUCKET: ${{ steps.tf-outputs.outputs.app_assets_bucket }}
        run: |
          aws s3 sync app/.open-next/assets "s3://${ASSETS_BUCKET}/_assets" --delete

      # ── 10. Invalidate CloudFront cache ────────────────────────────────────
      - name: Invalidate CloudFront cache
        env:
          DISTRIBUTION_ID: ${{ steps.tf-outputs.outputs.app_distribution_id }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*"

      # ── 11. Print deployment summary ───────────────────────────────────────
      - name: Print deployment summary
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo ""
          echo "Deploy complete"
          echo "  Commit  : ${{ github.sha }}"
          echo "  App URL : $(terraform output -raw app_url)"
          echo ""
