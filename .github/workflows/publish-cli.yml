# ── Publish CLI to npm ──────────────────────────────────────────────────────────
#
# SETUP REQUIRED: Add an NPM_TOKEN secret to your GitHub repo:
#   Settings → Secrets and variables → Actions → New repository secret
#   Name: NPM_TOKEN
#   Value: an npm access token with publish permission (https://www.npmjs.com/settings/~/tokens)
#
# ────────────────────────────────────────────────────────────────────────────────

name: Publish CLI to npm

on:
  push:
    branches:
      - main
    paths:
      - "cli/**"
  workflow_dispatch:

defaults:
  run:
    working-directory: cli

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check if version is already published
        id: version-check
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          if npm view pensieve-markdown@"$PACKAGE_VERSION" version 2>/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "pensieve-markdown@$PACKAGE_VERSION is already published — skipping."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "pensieve-markdown@$PACKAGE_VERSION not found on npm — will publish."
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.already_published == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
