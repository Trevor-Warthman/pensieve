# ── Publish CLI to npm ──────────────────────────────────────────────────────────
#
# SETUP REQUIRED: Store an npm access token in AWS Secrets Manager:
#   aws secretsmanager put-secret-value \
#     --secret-id pensieve/npm-token \
#     --secret-string "<your-npm-access-token>"
#
# The token needs publish permission. Generate one at:
#   https://www.npmjs.com/settings/~/tokens
#
# ────────────────────────────────────────────────────────────────────────────────

name: Publish CLI to npm

on:
  push:
    branches:
      - main
    paths:
      - "cli/**"
  workflow_dispatch:

defaults:
  run:
    working-directory: cli

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # required for OIDC token exchange
      contents: read    # required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::931097097534:role/pensieve-github-actions
          aws-region: us-east-1

      - name: Fetch npm token from Secrets Manager
        id: npm-secret
        run: |
          NPM_TOKEN=$(aws secretsmanager get-secret-value \
            --secret-id pensieve/npm-token \
            --query SecretString --output text)
          echo "::add-mask::$NPM_TOKEN"
          echo "token=$NPM_TOKEN" >> "$GITHUB_OUTPUT"
        working-directory: .

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check if version is already published
        id: version-check
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          if npm view pensieve-markdown@"$PACKAGE_VERSION" version 2>/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "pensieve-markdown@$PACKAGE_VERSION is already published — skipping."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "pensieve-markdown@$PACKAGE_VERSION not found on npm — will publish."
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.already_published == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ steps.npm-secret.outputs.token }}
