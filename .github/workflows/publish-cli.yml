# ── Pensieve CLI: publish to npm ────────────────────────────────────────────────
#
# Triggers on every push to main. Publishes cli/ to the npm registry as
# `pensieve-markdown`, but only if the version in cli/package.json isn't
# already published — safe to run on every push without a separate
# release/tag step. To ship a new CLI version: bump cli/package.json's
# "version" (keep package.json at repo root in sync too, since the CLI's
# own update-check reads that one) in the same PR as your change.
#
# Auth: npm Trusted Publishing (OIDC) — no token, no secret. npm verifies
# this exact workflow (org/repo/filename) is who it claims to be per-run via
# a short-lived, cryptographically-signed identity token. Configured on the
# npmjs.com side under the package's Settings -> Trusted Publisher (must
# match this file's name exactly). Requires npm CLI >= 11.5.1, hence the
# explicit upgrade step below (the runner's bundled npm is older).
#
# ──────────────────────────────────────────────────────────────────────────────

name: Publish CLI to npm

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write   # required for OIDC trusted publishing

jobs:
  publish:
    name: Publish (if version is new)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest

      - name: Check if this version is already published
        id: check
        working-directory: cli
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "pensieve-markdown@$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install & build
        if: steps.check.outputs.published == 'false'
        working-directory: cli
        run: npm ci

      - name: Publish to npm
        if: steps.check.outputs.published == 'false'
        working-directory: cli
        run: npm publish --access public

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.published }}" == "true" ]; then
            echo "cli/package.json version ${{ steps.check.outputs.version }} already on npm -- nothing to do."
          else
            echo "Published pensieve-markdown@${{ steps.check.outputs.version }} to npm."
          fi
